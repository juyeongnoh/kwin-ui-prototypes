<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>과제 관리</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .cb-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px; border: 1px solid var(--border);
      border-radius: 20px; background: var(--surface);
      font-size: 13px; cursor: pointer; user-select: none;
      transition: background .12s, border-color .12s, color .12s;
    }
    .cb-pill input { display: none; }
    .cb-pill:has(input:checked) { background: var(--accent); border-color: var(--accent); color: #fff; }
    .cb-pill.disabled { opacity: .5; cursor: not-allowed; }
    .cb-pill.disabled:has(input:checked) { background: var(--accent); border-color: var(--accent); color: #fff; }

    .modal-wrap {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.35);
      display: none; align-items: center; justify-content: center;
      padding: 20px;
    }
    .modal-wrap.open { display: flex; }
    .modal-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; display: flex; flex-direction: column;
      max-width: calc(100vw - 40px); max-height: calc(100vh - 40px);
      overflow: hidden;
    }
    .modal-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      flex-shrink: 0; gap: 12px;
    }
    .modal-title { font-size: 15px; font-weight: 600; }
    .modal-body  { flex: 1; overflow-y: auto; padding: 20px; }
    .modal-foot {
      display: flex; border-top: 1px solid var(--border);
      flex-shrink: 0; overflow: hidden;
      border-bottom-left-radius: 6px; border-bottom-right-radius: 6px;
    }
    .modal-foot .btn {
      flex: 1; border-radius: 0; padding: 14px; border: none;
      font-size: 14px; justify-content: center;
    }
    .modal-foot .btn + .btn { border-left: 1px solid var(--border); }
    .modal-foot .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .file-list { display: flex; flex-direction: column; gap: 3px; margin-top: 4px; }
    .file-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 8px; background: var(--accent-bg); border-radius: var(--radius);
      font-size: 11px;
    }
    .file-item button { background: none; border: none; cursor: pointer; color: var(--text-sub); font-size: 11px; padding: 0; }

    .sub-table tr[data-type] { cursor: pointer; }
    .sub-table tr[data-type]:hover td { background: #eef2ff; }

    .inline-table td { vertical-align: middle; }
    .inline-table input.input, .inline-table select.select { font-size: 12px; padding: 5px 8px; }
    .inline-table select.select { padding-right: 24px; }
    .inline-table .btn { padding: 4px 8px; font-size: 11px; }

    .date-preview-item { font-size: 11px; color: var(--text-sub); margin-top: 2px; line-height: 1.5; }

    /* version tabs */
    .version-tab-bar {
      display: flex; gap: 0; margin-bottom: 20px;
      border: 1px solid var(--border); border-radius: 6px;
      overflow: hidden; align-self: start; width: fit-content;
    }
    .version-tab {
      padding: 10px 24px; background: var(--surface); border: none;
      cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text-sub);
      transition: background .12s, color .12s; line-height: 1.4;
    }
    .version-tab + .version-tab { border-left: 1px solid var(--border); }
    .version-tab.active { background: var(--accent); color: #fff; font-weight: 600; }

    .version-desc {
      display: inline-block; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .5px;
      color: var(--text-sub); margin-bottom: 12px;
    }

    .section-head { display: flex; align-items: center; margin-bottom: 16px; }
  </style>
</head>
<body>
<div class="screen">

  <nav class="topnav">
    <a href="../index.html" class="topnav-back">← 목록</a>
    <span class="topnav-title">과제 관리</span>
    <span class="topnav-tag">prototype</span>
  </nav>

  <main class="content" style="max-width:none; margin:0; padding:24px;">

    <!-- 탭 -->
    <div class="version-tab-bar">
      <button class="version-tab active" id="tabA" onclick="switchVersion('a')">
        방식 A — 대표 + 세부과제 배정
      </button>
      <button class="version-tab" id="tabB" onclick="switchVersion('b')">
        방식 B — 세부과제에만 배정
      </button>
    </div>

    <!-- 방식 A -->
    <div id="sectionA">
      <div class="card">
        <div class="section-head">
          <div>
            <span class="section-title" style="margin-bottom:2px;">과제</span>
            <div class="text-sub text-sm">대표과제 · 세부과제 모두에 KPI · 컨설턴트 배정 가능</div>
          </div>
          <button class="btn btn-primary" style="margin-left:auto;" onclick="openProjectModal()">+ 추가</button>
        </div>
        <div id="tableA"></div>
      </div>
    </div>

    <!-- 방식 B -->
    <div id="sectionB" style="display:none;">
      <div class="card">
        <div class="section-head">
          <div>
            <span class="section-title" style="margin-bottom:2px;">과제</span>
            <div class="text-sub text-sm">세부과제에만 KPI · 컨설턴트 배정 가능</div>
          </div>
          <button class="btn btn-primary" style="margin-left:auto;" onclick="openProjectModal()">+ 추가</button>
        </div>
        <div id="tableB"></div>
      </div>
    </div>

  </main>
</div>

<!-- 과제 모달 -->
<div class="modal-wrap" id="projectModal">
  <div class="modal-box" style="width:820px;">
    <div class="modal-head">
      <span class="modal-title" id="pmTitle">과제 등록</span>
      <button class="btn btn-outline text-sm" onclick="closeProjectModal()">✕ 닫기</button>
    </div>
    <div class="modal-body" id="pmBody"></div>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="closeProjectModal()">취소</button>
      <button class="btn btn-primary" id="pmSaveBtn" onclick="saveProject()" disabled>저장</button>
    </div>
  </div>
</div>

<!-- 세부과제 모달 -->
<div class="modal-wrap" id="subModal" style="z-index:300; background:rgba(0,0,0,.5);">
  <div class="modal-box" style="width:720px;">
    <div class="modal-head">
      <span class="modal-title" id="smTitle">세부과제</span>
      <button class="btn btn-outline text-sm" onclick="closeSubModal()">✕ 닫기</button>
    </div>
    <div class="modal-body" id="smBody"></div>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="closeSubModal()">취소</button>
      <button class="btn btn-primary" id="smSaveBtn" onclick="saveSubModal()" disabled>저장</button>
    </div>
  </div>
</div>

<!-- 일자 모달 -->
<div class="modal-wrap" id="dateModal" style="z-index:400; background:rgba(0,0,0,.6);">
  <div class="modal-box" style="width:440px;">
    <div class="modal-head">
      <span class="modal-title">예정 컨설팅 일자</span>
      <button class="btn btn-outline text-sm" onclick="closeDateModal()">✕ 닫기</button>
    </div>
    <div class="modal-body" id="dmBody"></div>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="closeDateModal()">취소</button>
      <button class="btn btn-primary" onclick="saveDateModal()">저장</button>
    </div>
  </div>
</div>

<script src="../js/main.js"></script>
<script src="../js/case-ui.js"></script>
</body>
</html>
