<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>과제 등록 | 관리자 UI</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    /* ── checkbox pill ── */
    .cb-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px; border: 1px solid var(--border);
      border-radius: 20px; background: var(--surface);
      font-size: 13px; cursor: pointer; user-select: none;
      transition: background .12s, border-color .12s, color .12s;
    }
    .cb-pill input { display: none; }
    .cb-pill:has(input:checked) {
      background: var(--accent); border-color: var(--accent); color: #fff;
    }
    .cb-pill.disabled {
      opacity: .5; cursor: not-allowed;
    }
    .cb-pill.disabled:has(input:checked) {
      background: #888; border-color: #888; color: #fff;
    }

    /* ── subtype grid ── */
    .subtype-group { display: flex; flex-wrap: wrap; gap: 6px; }

    /* ── section divider within card ── */
    .inner-section {
      border: 1px dashed var(--border); border-radius: var(--radius);
      padding: 14px; margin-top: 16px;
    }
    .inner-section-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .inner-section-title {
      font-size: 11px; font-weight: 700; color: var(--text-sub);
      text-transform: uppercase; letter-spacing: .6px;
    }

    /* ── KPI row ── */
    .kpi-item {
      display: grid;
      grid-template-columns: 90px 1fr 110px 110px 100px 60px;
      gap: 8px; align-items: center;
      padding: 10px 12px; margin-bottom: 8px;
      background: var(--accent-bg); border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .kpi-rate {
      font-size: 12px; font-weight: 700; text-align: center;
      padding: 4px 6px; border-radius: var(--radius);
      background: var(--surface); border: 1px solid var(--border);
    }
    .kpi-rate.positive { color: #2a6a2a; border-color: #9acc9a; background: #e8f4e8; }
    .kpi-rate.negative { color: #7a1a1a; border-color: #e89a9a; background: #fde8e8; }
    .main-kpi-label {
      display: flex; align-items: center; gap: 4px;
      font-size: 11px; color: var(--text-sub); cursor: pointer;
      white-space: nowrap;
    }
    .main-kpi-label:has(input:checked) { color: #2a5e9e; font-weight: 700; }

    /* ── item card (품목 / 컨설턴트) ── */
    .item-card {
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 14px; margin-bottom: 10px; background: var(--surface);
    }
    .item-card-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }

    /* ── date tags ── */
    .date-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .date-tag {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border: 1px solid var(--border);
      border-radius: 20px; font-size: 12px; background: var(--surface);
    }
    .date-tag button {
      background: none; border: none; cursor: pointer;
      color: var(--text-sub); padding: 0; font-size: 11px; line-height: 1;
    }

    /* ── file list ── */
    .file-list { display: flex; flex-direction: column; gap: 4px; margin-top: 6px; }
    .file-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 5px 10px; background: var(--accent-bg); border-radius: var(--radius);
      font-size: 12px;
    }
    .file-item button {
      background: none; border: none; cursor: pointer;
      color: var(--text-sub); font-size: 12px;
    }

    /* ── sticky action bar ── */
    .action-bar {
      position: sticky; bottom: 0; z-index: 50;
      background: var(--surface); border-top: 1px solid var(--border);
      padding: 12px 20px; display: flex; justify-content: flex-end; gap: 8px;
    }

    /* ── inline alert ── */
    .inline-alert {
      font-size: 12px; color: #a02020;
      background: #fde8e8; border: 1px solid #e89a9a;
      border-radius: var(--radius); padding: 5px 12px;
      display: none;
    }
  </style>
</head>
<body>
<div class="screen">

  <nav class="topnav">
    <a href="projects.html" class="topnav-back">← 과제 관리</a>
    <span class="topnav-title">과제 등록</span>
    <span class="topnav-tag">prototype</span>
  </nav>

  <main class="content" style="max-width:900px; padding-bottom: 0;">

    <!-- 1. 기본 정보 -->
    <div class="card mb-16">
      <span class="section-title">기본 정보</span>

      <div class="form-row mb-16">
        <label class="label">지원유형 *</label>
        <select class="select" id="supportType" style="max-width:220px;">
          <option value="">선택하세요</option>
          <option>생산혁신</option>
          <option>기술혁신</option>
          <option>일터혁신</option>
          <option>시장혁신</option>
        </select>
      </div>

      <div class="form-row mb-16">
        <label class="label">세부유형</label>
        <div class="subtype-group">
          <label class="cb-pill"><input type="checkbox" value="p"> P</label>
          <label class="cb-pill"><input type="checkbox" value="q1"> Q1</label>
          <label class="cb-pill"><input type="checkbox" value="q2"> Q2</label>
          <label class="cb-pill"><input type="checkbox" value="c"> C</label>
          <label class="cb-pill"><input type="checkbox" value="d"> D</label>
          <label class="cb-pill"><input type="checkbox" value="m1"> M1</label>
          <label class="cb-pill"><input type="checkbox" value="m2"> M2</label>
          <label class="cb-pill"><input type="checkbox" value="ma1"> MA1</label>
          <label class="cb-pill"><input type="checkbox" value="ma2"> MA2</label>
        </div>
      </div>

      <div class="form-row">
        <label class="label">지원구분</label>
        <div class="row" style="gap:10px; flex-wrap:wrap; align-items:center;">
          <label class="cb-pill" id="pillConsulting">
            <input type="checkbox" id="chkConsulting"> 컨설팅
          </label>
          <label class="cb-pill disabled" id="pillDirect" title="직접지원은 항상 포함됩니다">
            <input type="checkbox" id="chkDirect" checked> 직접지원
          </label>
          <span class="inline-alert" id="directAlert">⚠ 직접지원은 항상 포함됩니다.</span>
        </div>
      </div>
    </div>

    <!-- 2. 과제 내용 -->
    <div class="card mb-16">
      <span class="section-title">과제 내용</span>
      <div class="form-row mb-16">
        <label class="label">문제점 및 현황</label>
        <textarea class="textarea" rows="3" placeholder="현재 문제점 및 현황을 입력하세요"></textarea>
      </div>
      <div class="form-row mb-16">
        <label class="label">과제 내용 (1줄 요약)</label>
        <input class="input" type="text" placeholder="핵심 과제를 한 줄로 요약하세요" />
      </div>
      <div class="form-row">
        <label class="label">목표 (추진목적, CSF 등)</label>
        <textarea class="textarea" rows="2" placeholder="과제의 목표와 추진 방향을 입력하세요"></textarea>
      </div>
    </div>

    <!-- 3. 대표과제 KPI -->
    <div class="card mb-16">
      <div class="row mb-16" style="align-items:center;">
        <span class="section-title" style="margin-bottom:0;">KPI <span class="text-sub text-sm font-bold" style="font-weight:400;">(대표과제)</span></span>
        <button class="btn btn-outline text-sm" style="margin-left:auto;" onclick="addKpi('mainKpiList')">+ KPI 추가</button>
      </div>
      <div id="mainKpiList"></div>
      <div class="placeholder" style="height:44px;" id="mainKpiEmpty">KPI를 추가하세요</div>
    </div>

    <!-- 4. 세부과제 (동적) -->
    <div id="subProjectArea"></div>

  </main>

  <div class="action-bar">
    <a href="projects.html" class="btn btn-outline">취소</a>
    <button class="btn btn-primary" onclick="handleSave()">저장</button>
  </div>
</div>

<script src="../js/main.js"></script>
<script src="../js/project-form.js"></script>
</body>
</html>
